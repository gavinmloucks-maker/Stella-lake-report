<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stella Lake Report</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🌊 Stella Lake Report</h1>

<div class="card">

<h2>Today's Conditions</h2>

<button onclick="getWeather()">🌤️ Update Weather</button>

<p id="weatherStatus">Weather not loaded</p>

<label>🌊 Water Temperature (°F)</label>
<input id="waterTemp" type="number" value="75">


<label>🌡️ Air Temperature (°F)</label>
<input id="airTemp" type="number" value="80">


<label>💨 Wind Speed (mph)</label>
<input id="windSpeed" type="number" value="5">


<label>💨 Wind Gusts (mph)</label>
<input id="gusts" type="number" value="8">


<label>☁️ Cloud Cover (%)</label>
<input id="clouds" type="number" value="20">


<label>🌧️ Rain Chance (%)</label>
<input id="rain" type="number" value="0">


<button onclick="calculate()">🚤 Calculate Lake Score</button>

</div>


<div class="card results">

<h2>Lake Rating</h2>

<h1 id="overall">--</h1>

<h2 id="description"></h2>


<h2>🏆 Best Activity</h2>

<h1 id="winner">--</h1>


<p>🏄 Wakeboard:
<span id="wakeboard">--</span>
</p>


<p>🌊 Wakesurf:
<span id="surf">--</span>
</p>


<p>🎿 Ski:
<span id="ski">--</span>
</p>


<p>🛟 Tube:
<span id="tube">--</span>
</p>


<h2>🚤 Boat Recommendation</h2>

<p id="boat">--</p>


</div>


<div class="card">

<h2>📖 Lake Day Log</h2>

<button onclick="saveDay()">Save This Day</button>

<p id="saved"></p>

</div>


</div>


<script src="script.js"></script>

</body>

</html>
